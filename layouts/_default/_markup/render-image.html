{{ if .Title }}
  <figure>
    <img style="display: block; margin: 0 auto;" src="{{ .Destination | safeURL }}" alt="{{ .Text }}">
    <figcaption style="text-align: center; font-weight: lighter;">{{ .Title }}</figcaption>
  </figure>
{{ else }}
  <img src="{{ .Destination | safeURL }}" alt="{{ .Text }}">
{{ end }}
